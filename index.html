  <body>
    <script>
      // GitHub Pages SPA: restore path from ?p= redirect
      (function() {
        var redirect = new URLSearchParams(window.location.search).get('p');
        if (redirect) {
          window.history.replaceState(null, '', decodeURIComponent(redirect));
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
